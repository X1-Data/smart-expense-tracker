<body class="min-h-[1024px] flex items-center justify-center p-md md:p-xl" data-stitch-vh="min-h-[1024px]===min-h-screen" data-mode="connect">
<!-- Sidebar Shell (Anchored from JSON) -->
<aside class="fixed left-0 top-0 h-[1024px] w-[240px] flex flex-col h-full py-lg px-md bg-surface border-r border-outline-variant hidden md:flex" data-stitch-vh="h-[1024px]===h-screen">
<div class="mb-xl">
<h2 class="text-h2 font-h2 text-primary flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
                Smart Expense
            </h2>
<p class="text-body-sm text-on-surface-variant px-sm opacity-70">AI Financial Companion</p>
</div>
<nav class="flex flex-col gap-1"><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">home</span><span class="font-body text-body">หน้าหลัก</span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">auto_awesome</span><span class="font-body text-body">Smart Add</span></a><a class="flex items-center gap-md p-md rounded-xl text-primary font-bold border-r-4 border-primary bg-primary-container/10" href="#"><span class="material-symbols-outlined">add_circle</span><span class="font-body text-body">เพิ่มรายการ</span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">history</span><span class="font-body text-body">ประวัติรายการ</span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">analytics</span><span class="font-body text-body">วิเคราะห์การใช้จ่าย</span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined"><span style="font-family: Inter; font-size: 15px; white-space: normal;" class=""><span style="font-family: &quot;Material Symbols Outlined&quot;; font-size: 24px; white-space: nowrap;" class="">local_fire_department</span></span></span><span class="font-body text-body"><span style="background-color: rgb(238, 238, 234);" class="">Streak</span></span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">chat</span><span class="font-body text-body">Feedback AI</span></a><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">settings</span><span class="font-body text-body">ตั้งค่า</span></a><div class="my-sm border-t border-outline-variant/30"></div><a class="flex items-center gap-md p-md rounded-xl text-on-surface-variant hover:bg-surface-container transition-colors" href="#"><span class="material-symbols-outlined">admin_panel_settings</span><span class="font-body text-body">Admin Dashboard</span></a></nav>
</aside>
<!-- Main Content Canvas -->
<main class="w-full max-w-lg md:ml-[240px] flex flex-col gap-lg">
<!-- Header -->
<!-- Transaction Form Card -->
<h1 class="font-h1 text-h1 text-on-surface mb-md">เพิ่มรายการ</h1><section class="bg-surface-container-lowest rounded-[16px] card-shadow p-xl border border-outline-variant/30">
<form class="flex flex-col gap-lg" id="transaction-form">
<!-- Type Toggle -->
<div class="flex p-xs bg-surface-container-low rounded-full toggle-group">
<button class="flex-1 py-sm px-md rounded-full font-button text-button flex items-center justify-center gap-sm bg-primary text-on-primary" id="toggle-expense" type="button">
<span class="material-symbols-outlined !text-[20px]" data-icon="arrow_outward">arrow_outward</span>
                        Expense
                    </button>
<button class="flex-1 py-sm px-md rounded-full font-button text-button flex items-center justify-center gap-sm text-on-surface-variant hover:bg-surface-container-highest transition-colors" id="toggle-income" type="button">
<span class="material-symbols-outlined !text-[20px]" data-icon="call_received">call_received</span>
                        Income
                    </button>
</div>
<div class="space-y-lg">
<!-- Description -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant ml-sm uppercase tracking-wider" for="description">รายละเอียด</label>
<div class="relative">
<input class="w-full px-md py-[14px] rounded-xl border-[1.5px] border-outline-variant bg-white focus:border-primary focus:ring-0 focus:outline-none transition-all placeholder:text-on-surface-variant/40 font-body text-body" id="description" placeholder="เช่น กาแฟลาเต้" required="" type="text">
</div>
</div>
<!-- Amount -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant ml-sm uppercase tracking-wider" for="amount">จำนวนเงิน</label>
<div class="relative group">
<span class="absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant font-h2">฿</span>
<input class="w-full pl-xl pr-md py-[14px] rounded-xl border-[1.5px] border-outline-variant bg-white focus:border-primary focus:ring-0 focus:outline-none transition-all font-h2 text-h2 text-on-surface" id="amount" placeholder="0.00" required="" step="0.01" type="number">
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg">
<!-- Category -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant ml-sm uppercase tracking-wider" for="category">หมวดหมู่</label>
<div class="relative">
<select class="w-full px-md py-[14px] rounded-xl border-[1.5px] border-outline-variant bg-white appearance-none focus:border-primary focus:ring-0 focus:outline-none transition-all font-body text-body text-on-surface" id="category"><option value="food">☕ อาหาร</option><option value="transport">🚕 เดินทาง</option><option value="entertainment">🎮 ความบันเทิง</option><option value="shopping">🛍 ช้อปปิ้ง</option><option value="income">💰 รายได้</option><option value="other">📦 อื่นๆ</option></select>
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Date -->
<div class="flex flex-col gap-xs">
<label class="font-label text-label text-on-surface-variant ml-sm uppercase tracking-wider" for="date">วันที่</label>
<div class="relative">
<input class="w-full px-md py-[14px] rounded-xl border-[1.5px] border-outline-variant bg-white focus:border-primary focus:ring-0 focus:outline-none transition-all font-body text-body text-on-surface" id="date" type="date">
<span class="material-symbols-outlined absolute right-md top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full py-lg rounded-xl bg-primary text-on-primary font-button text-button shadow-md hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
                    บันทึกข้อมูล
                </button>
</form>
</section>
<!-- Decorative Asset -->
<div class="hidden md:block absolute -z-10 bottom-0 right-0 w-[400px] h-[400px] opacity-20 pointer-events-none">
</div>
</main>
<!-- Bottom Nav for Mobile (As per JSON/Design System) -->
<nav class="md:hidden fixed bottom-0 left-0 right-0 h-16 bg-surface-container-lowest border-t border-outline-variant flex items-center justify-around z-50">
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-label text-[10px]">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<div class="bg-primary-container/20 p-sm rounded-full -mt-md mb-xs">
<span class="material-symbols-outlined !text-[28px]" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
</div>
<span class="font-label text-[10px] font-bold">Add</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-label text-[10px]">History</span>
</button>
<button class="flex flex-col items-center gap-1 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label text-[10px]">Analytics</span>
</button>
</nav>
<script>
        // Toggle Logic
        const btnExpense = document.getElementById('toggle-expense');
        const btnIncome = document.getElementById('toggle-income');
        const submitBtn = document.querySelector('button[type="submit"]');

        btnExpense.addEventListener('click', () => {
            btnExpense.classList.add('bg-primary', 'text-on-primary');
            btnExpense.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-highest');
            btnIncome.classList.remove('bg-secondary-container', 'text-on-secondary-container');
            btnIncome.classList.add('text-on-surface-variant', 'hover:bg-surface-container-highest');
            submitBtn.style.backgroundColor = '#44664a'; // primary
        });

        btnIncome.addEventListener('click', () => {
            btnIncome.classList.add('bg-secondary-container', 'text-on-secondary-container');
            btnIncome.classList.remove('text-on-surface-variant', 'hover:bg-surface-container-highest');
            btnExpense.classList.remove('bg-primary', 'text-on-primary');
            btnExpense.classList.add('text-on-surface-variant', 'hover:bg-surface-container-highest');
            submitBtn.style.backgroundColor = '#8e4e14'; // secondary
        });

        // Set default date to today
        document.getElementById('date').valueAsDate = new Date();

        // Form submission animation
        document.getElementById('transaction-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>';
            btn.disabled = true;
            
            setTimeout(() => {
                btn.innerHTML = '<span class="material-symbols-outlined" data-icon="check_circle">check_circle</span> Success';
                btn.classList.add('bg-tertiary-container', 'text-on-tertiary-container');
                setTimeout(() => {
                    btn.innerHTML = originalContent;
                    btn.classList.remove('bg-tertiary-container', 'text-on-tertiary-container');
                    btn.disabled = false;
                    e.target.reset();
                    document.getElementById('date').valueAsDate = new Date();
                }, 2000);
            }, 1000);
        });
    </script>
</body></html>
