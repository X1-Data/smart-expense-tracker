<!DOCTYPE html>

<html class="light" lang="th"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>เข้าสู่ระบบ - AI Smart Expense Tracker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#7A9E7E",
                    "error": "#D9534F",
                    "warm-cream": "#F8F7F2",
                    "on-surface": "#1a1c1a",
                    "on-surface-variant": "#424842",
                    "outline-variant": "#c2c8bf",
                    "surface-container-lowest": "#ffffff",
                    "surface": "#ffffff",
                    "on-primary": "#ffffff"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "12px",
                    "full": "9999px"
            },
            "spacing": {
                    "md": "16px",
                    "sm": "8px",
                    "xl": "32px",
                    "unit": "4px",
                    "container-max": "1200px",
                    "xs": "4px",
                    "lg": "24px",
                    "gutter": "20px"
            },
            "fontFamily": {
                    "body": ["Inter", "sans-serif"],
                    "h1": ["Inter", "sans-serif"],
                    "h2": ["Inter", "sans-serif"]
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #F8F7F2;
            overflow-x: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: #7A9E7E;
            filter: blur(100px);
            opacity: 0.08;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }

        .blob-tl { top: -250px; left: -250px; }
        .blob-br { bottom: -250px; right: -250px; }

        .auth-card {
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.03);
            width: 420px;
        }

        input:focus {
            outline: none !important;
            border-color: #7A9E7E !important;
            box-shadow: 0 0 0 2px rgba(122, 158, 126, 0.2) !important;
        }

        input.error {
            border-color: #D9534F !important;
        }

        input.success {
            border-color: rgba(122, 158, 126, 0.5) !important;
        }

        .tab-active {
            color: #7A9E7E;
            border-bottom: 2px solid #7A9E7E;
        }

        .strength-bar {
            height: 4px;
            border-radius: 2px;
            transition: all 0.3s ease;
            width: 0%;
        }
    </style>
</head>
<body class="font-body text-on-surface flex items-center justify-center min-h-screen relative">
<!-- Organic Background Blobs -->
<div class="blob blob-tl"></div>
<div class="blob blob-br"></div>
<main class="relative z-10 w-full px-md flex flex-col items-center">
<!-- Brand Header -->
<div class="mb-xl text-center">
<div class="flex items-center justify-center gap-2 mb-sm">
<span class="material-symbols-outlined text-primary text-[32px]">auto_awesome</span>
<h1 class="text-[28px] font-semibold text-on-surface">Smart Expense</h1>
</div>
<p class="text-[14px] text-on-surface-variant">Your AI Financial Companion</p>
</div>
<!-- Auth Card -->
<div class="auth-card bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden transition-all duration-300">
<!-- Tab Toggle -->
<div class="flex border-b border-outline-variant">
<button class="flex-1 py-md font-medium text-[15px] transition-all tab-active" id="tab-login" onclick="toggleTab('login')">
                    เข้าสู่ระบบ
                </button>
<button class="flex-1 py-md font-medium text-[15px] transition-all text-on-surface-variant hover:text-primary" id="tab-register" onclick="toggleTab('register')">
                    สมัครสมาชิก
                </button>
</div>
<div class="p-xl">
<!-- Login View -->
<div id="login-form">
<div class="mb-lg">
<h2 class="text-[20px] font-semibold">ยินดีต้อนรับกลับ</h2>
<p class="text-[13px] text-on-surface-variant">เข้าสู่แดชบอร์ดการเงินของคุณ</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="email">อีเมล</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="email" placeholder="hello@example.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="password">รหัสผ่าน</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full h-12 mt-sm bg-primary text-on-primary font-medium rounded-xl hover:brightness-105 transition-all">
                            เข้าสู่ระบบ
                        </button>
</form>
<div class="flex items-center gap-md my-lg">
<div class="h-[1px] flex-1 bg-outline-variant"></div>
<span class="text-[12px] text-on-surface-variant">หรือ</span>
<div class="h-[1px] flex-1 bg-outline-variant"></div>
</div>
<button class="w-full h-12 flex items-center justify-center gap-md border border-outline-variant bg-white rounded-xl hover:bg-warm-cream transition-all">
<img alt="Google" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCRa6KUUxHI31La6S8CSDkzaZyThW4_6kPXZf-AGPHw7WA_dCCbFTkFWXFfuk8lCbhYWHfTqWvT8qBdG1gleikXdFBrOkZzUlsB8LGFeSVnO476KFaAAneLRex3AnVM0aFkTsj-d9QJbzmMsAvHFgRqJvPox-tEawhFq9ygTxb9_AcgCg8HMaeTiWvmhlThDd3Odaa4W0iRHNqUTOY5c2b_Mr1h3jMMPDeo6WAIky8ULl30RMt6f3Jiee_IB3ARflNuyG10WZNRUKM"/>
<span class="text-[15px] font-medium text-on-surface">เข้าสู่ระบบด้วย Google</span>
</button>
<p class="text-center text-[13px] text-on-surface-variant mt-xl">
                        ยังไม่มีบัญชี? <button class="text-primary font-semibold hover:underline" onclick="toggleTab('register')">สมัครสมาชิก</button>
</p>
</div>
<!-- Register View (Hidden by default) -->
<div class="hidden" id="register-form">
<div class="mb-lg">
<h2 class="text-[20px] font-semibold">สร้างบัญชีใหม่</h2>
<p class="text-[13px] text-on-surface-variant">เริ่มต้นเส้นทางการเงินที่ชาญฉลาดของคุณ</p>
</div>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="reg-username">ชื่อผู้ใช้</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="reg-username" placeholder="ชื่อของคุณ" type="text"/>
</div>
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="reg-email">อีเมล</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="reg-email" placeholder="email@example.com" type="email"/>
</div>
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="reg-password">รหัสผ่าน</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="reg-password" oninput="updatePasswordStrength(this.value)" placeholder="••••••••" type="password"/>
<div class="mt-1 h-1 w-full bg-outline-variant rounded-full overflow-hidden">
<div class="strength-bar bg-error" id="strength-bar"></div>
</div>
<span class="text-[10px] text-on-surface-variant" id="strength-text">ความปลอดภัยรหัสผ่าน</span>
</div>
<div class="flex flex-col gap-xs">
<label class="text-[12px] font-medium text-on-surface-variant" for="confirm-password">ยืนยันรหัสผ่าน</label>
<input class="w-full h-12 px-md rounded-xl border border-outline-variant bg-surface text-[15px] transition-all" id="confirm-password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full h-12 mt-sm bg-primary text-on-primary font-medium rounded-xl hover:brightness-105 transition-all">
                            สร้างบัญชี
                        </button>
</form>
<p class="text-center text-[13px] text-on-surface-variant mt-xl">
                        มีบัญชีอยู่แล้ว? <button class="text-primary font-semibold hover:underline" onclick="toggleTab('login')">เข้าสู่ระบบ</button>
</p>
</div>
</div>
</div>
</main>
<!-- Aesthetic Decoration -->
<div class="fixed bottom-12 right-12 opacity-20 select-none pointer-events-none">
<span class="material-symbols-outlined text-primary text-[100px] rotate-12">spa</span>
</div>
<script>
        function toggleTab(target) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');

            if (target === 'register') {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabRegister.classList.add('tab-active');
                tabRegister.classList.remove('text-on-surface-variant');
                tabLogin.classList.remove('tab-active');
                tabLogin.classList.add('text-on-surface-variant');
            } else {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                tabLogin.classList.add('tab-active');
                tabLogin.classList.remove('text-on-surface-variant');
                tabRegister.classList.remove('tab-active');
                tabRegister.classList.add('text-on-surface-variant');
            }
        }

        function updatePasswordStrength(password) {
            const bar = document.getElementById('strength-bar');
            const text = document.getElementById('strength-text');
            let strength = 0;
            
            if (password.length > 0) strength += 20;
            if (password.length > 6) strength += 20;
            if (/[A-Z]/.test(password)) strength += 20;
            if (/[0-9]/.test(password)) strength += 20;
            if (/[^A-Za-z0-9]/.test(password)) strength += 20;

            bar.style.width = strength + '%';
            
            if (strength <= 40) {
                bar.style.backgroundColor = '#D9534F'; // Error Red
                text.innerText = 'รหัสผ่านอ่อนเกินไป';
                text.style.color = '#D9534F';
            } else if (strength <= 80) {
                bar.style.backgroundColor = '#F0AD4E'; // Warning Orange
                text.innerText = 'รหัสผ่านปานกลาง';
                text.style.color = '#F0AD4E';
            } else {
                bar.style.backgroundColor = '#7A9E7E'; // Success Green
                text.innerText = 'รหัสผ่านแข็งแกร่ง';
                text.style.color = '#7A9E7E';
            }
        }

        // Example validation visual states (demo only)
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('blur', function() {
                if(this.id === 'email' && this.value && !this.value.includes('@')) {
                    this.classList.add('error');
                    // In a real app, you'd add a <p> tag with red text here
                } else if(this.value) {
                    this.classList.remove('error');
                    this.classList.add('success');
                } else {
                    this.classList.remove('error', 'success');
                }
            });
        });
    </script>
</body></html>
